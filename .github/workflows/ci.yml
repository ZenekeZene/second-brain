name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check for syntax errors
        run: |
          for f in bin/*.mjs bin/lib/*.mjs; do
            node --check "$f" || exit 1
          done

      - name: Verify required files exist
        run: |
          test -f CLAUDE.md       || (echo "Missing CLAUDE.md" && exit 1)
          test -f .env.example    || (echo "Missing .env.example" && exit 1)
          test -f LICENSE         || (echo "Missing LICENSE" && exit 1)
          test -f CONTRIBUTING.md || (echo "Missing CONTRIBUTING.md" && exit 1)

      - name: Verify .env is not committed
        run: |
          ! git ls-files --error-unmatch .env 2>/dev/null || (echo ".env should not be committed" && exit 1)

      - name: Verify no secrets patterns in source
        run: |
          if git grep -rn "sk-proj-\|OPENAI_API_KEY=.\|BOT_TOKEN=." -- bin/ prompts/ CLAUDE.md; then
            echo "Possible secret found in source files"
            exit 1
          fi
